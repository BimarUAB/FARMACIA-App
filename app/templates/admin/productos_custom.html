{% extends 'admin/model/list.html' %}

{% block page_body %}
<style>
    .btn-nuevo-producto-custom {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        color: white !important;
        padding: 10px 25px;
        border-radius: 25px;
        font-weight: bold;
        margin-bottom: 20px;
        display: inline-block;
        text-decoration: none;
        box-shadow: 0 4px 15px rgba(56, 239, 125, 0.4);
        transition: all 0.3s ease;
    }
    .btn-nuevo-producto-custom:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(56, 239, 125, 0.6);
        color: white !important;
    }
    .custom-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
    }
</style>

<div class="custom-header">
    <h1 style="margin: 0; font-size: 2rem;">
        <i class="fa fa-box-open me-2"></i>Gestión de Productos
    </h1>
    <p style="margin: 10px 0 0 0; opacity: 0.9;">Administra tu inventario de productos</p>
</div>

<div style="margin-bottom: 20px;">
    <a href="{{ url_for('.create') }}" class="btn-nuevo-producto-custom">
        <i class="fa fa-plus-circle me-2"></i>➕ Nuevo Producto
    </a>
</div>

{{ super() }}
{% endblock %}
