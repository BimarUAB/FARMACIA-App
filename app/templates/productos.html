<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Gestión de Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('auth.dashboard') }}">🛒 Gestión de Ventas</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-item nav-link text-white">
                    {{ current_user.username }}
                </span>
                <a class="nav-link" href="{{ url_for('auth.logout') }}">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>📦 Productos</h2>
        
        <div class="mb-3">
            <a href="{{ url_for('auth.dashboard') }}" class="btn btn-secondary">⬅️ Volver al Dashboard</a>
        </div>

        <div class="row">
            {% for p in productos %}
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">{{ p.nombre }}</h5>
                        <p class="card-text">{{ p.descripcion or 'Sin descripción' }}</p>
                        <p class="card-text">
                            <strong>Precio:</strong> ${{ "%.2f"|format(p.precio) }}<br>
                            <strong>Stock:</strong> 
                            <span class="badge bg-{{ 'success' if p.stock > 10 else 'warning' if p.stock > 0 else 'danger' }}">
                                {{ p.stock }}
                            </span>
                        </p>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-12">
                <div class="alert alert-info">
                    No hay productos registrados.
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
