<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot IA - Gestion de Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
        }
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .chat-messages {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        .message.user {
            flex-direction: row-reverse;
        }
        .message-content {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            margin: 0 10px;
            line-height: 1.5;
        }
        .message.bot .message-content {
            background: white;
            border: 1px solid #e0e0e0;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        .typing-indicator {
            display: none;
            padding: 10px 20px;
            color: #666;
            font-style: italic;
        }
        .btn-send {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-container">
            <div class="chat-header">
                <h4><i class="fas fa-robot me-2"></i>Asistente Virtual - Ventas</h4>
                <p class="mb-0"> Powered by Google Gemini</p>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-content">
                        ¡Hola! 👋 Soy tu asistente virtual de Ventas. ¿En qué puedo ayudarte hoy?
                    </div>
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator">
                <i class="fas fa-spinner fa-spin me-2"></i>Gemini está pensando...
            </div>
            
            <div class="chat-input">
                <form id="chatForm" class="d-flex gap-2">
                    <input type="text" class="form-control form-control-lg" id="userInput" 
                           placeholder="Escribe tu pregunta aquí..." autocomplete="off">
                    <button type="submit" class="btn btn-send">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const chatMessages = document.getElementById('chatMessages');
        const typingIndicator = document.getElementById('typingIndicator');

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const pregunta = userInput.value.trim();
            if (!pregunta) return;
            
            // Agregar mensaje del usuario
            addMessage(pregunta, 'user');
            userInput.value = '';
            userInput.disabled = true;
            
            typingIndicator.style.display = 'block';
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            try {
                const response = await fetch('/chatbot/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pregunta: pregunta })
                });
                
                const data = await response.json();
                
                typingIndicator.style.display = 'none';
                
                if (data.success) {
                    addMessage(data.respuesta, 'bot');
                } else {
                    addMessage(' ' + data.error, 'bot');
                }
            } catch (error) {
                typingIndicator.style.display = 'none';
                addMessage(' Error de conexión', 'bot');
            } finally {
                userInput.disabled = false;
                userInput.focus();
            }
        });

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.innerHTML = `<div class="message-content">${text}</div>`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        userInput.focus();
    </script>
</body>
</html>
