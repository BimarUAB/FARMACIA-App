<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Gestión de Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">🛒 Gestión de Ventas</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-item nav-link text-white">
                    Hola, {{ current_user.username }} ({{ current_user.role }})
                </span>
                <a class="nav-link" href="{{ url_for('auth.logout') }}">Cerrar Sesión</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-5">
        <div class="alert alert-success">
            <h4>¡Bienvenido al sistema!</h4>
            <p>Has iniciado sesión correctamente.</p>
        </div>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <h5 class="card-title">📦 Productos</h5>
                        <a href="{{ url_for('auth.productos') }}" class="btn btn-primary">Ver Productos</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <h5 class="card-title">⚙️ Panel Admin</h5>
                        <a href="/admin" class="btn btn-success">Ir al Admin</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <h5 class="card-title">🚪 Sesión</h5>
                        <a href="{{ url_for('auth.logout') }}" class="btn btn-danger">Cerrar Sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
